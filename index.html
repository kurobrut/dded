<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Secure Password Generator</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.07);
  padding: 30px;
  border-radius: 25px;
  width: 420px;
  height: 580px;
  color: white;
  box-shadow: 0 15px 50px rgba(0,0,0,0.6);
  display: flex;
  flex-direction: column;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
  font-weight: 600;
}

input[type="text"] {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 12px;
  font-size: 14px;
  letter-spacing: 1px;
}

input[type="range"] {
  width: 100%;
}

button {
  padding: 11px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin-top: 10px;
  font-weight: bold;
  transition: 0.2s ease;
}

button:active {
  transform: scale(0.97);
}

.generate {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
}

.copy {
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  color: white;
}

.clear {
  background: #ef4444;
  color: white;
}

.strength-container {
  margin-top: 12px;
}

.strength-bar-bg {
  background: rgba(255,255,255,0.1);
  height: 10px;
  border-radius: 20px;
  overflow: hidden;
  margin-top: 6px;
}

.strength-bar {
  height: 100%;
  transition: width 0.4s ease;
}

.history {
  margin-top: 15px;
  font-size: 12px;
  flex: 1;
  overflow-y: auto;
  padding-right: 6px;
}

.history::-webkit-scrollbar {
  width: 6px;
}

.history::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}

.history-item {
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.copy-feedback {
  font-size: 12px;
  color: #22c55e;
  margin-top: 5px;
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [length, setLength] = React.useState(16);
  const [password, setPassword] = React.useState("");
  const [entropy, setEntropy] = React.useState(0);
  const [history, setHistory] = React.useState([]);
  const [copied, setCopied] = React.useState(false);

  const prefixes = [
    "kalirem","rem","kali","Kali","Rem",
    "KaliRem","KALIREM","KALI","REM"
  ];

  const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

  const secureRandomIndex = (max) => {
    const array = new Uint32Array(1);
    const limit = Math.floor(4294967296 / max) * max;
    let random;
    do {
      window.crypto.getRandomValues(array);
      random = array[0];
    } while (random >= limit);
    return random % max;
  };

  const generatePassword = () => {
    const prefix = prefixes[secureRandomIndex(prefixes.length)];

    if (length <= prefix.length) return;

    const remainingLength = length - prefix.length;

    let randomChars = [];
    for (let i = 0; i < remainingLength; i++) {
      randomChars.push(charset[secureRandomIndex(charset.length)]);
    }

    const insertPosition = secureRandomIndex(randomChars.length + 1);
    randomChars.splice(insertPosition, 0, ...prefix.split(""));

    const finalPassword = randomChars.join("");

    const totalEntropy = finalPassword.length * Math.log2(charset.length);

    setPassword(finalPassword);
    setEntropy(totalEntropy);
    setHistory([finalPassword, ...history.slice(0, 4)]);
    setCopied(false);
  };

  const copyPassword = async () => {
    if (!password) return;
    await navigator.clipboard.writeText(password);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const clearHistory = () => setHistory([]);

  const strengthPercentage = Math.min((entropy / 120) * 100, 100);

  const strengthColor =
    entropy < 50 ? "red" :
    entropy < 80 ? "orange" :
    "limegreen";

  const strengthLabel =
    entropy < 50 ? "Weak" :
    entropy < 80 ? "Medium" :
    "Strong";

  return (
    <div className="card">
      <h2>🔐 Advanced Password Generator</h2>

      <input type="text" value={password} readOnly placeholder="Click generate..." />

      <label>Password Length: {length}</label>
      <input
        type="range"
        min="10"
        max="28"
        value={length}
        onChange={e => setLength(Number(e.target.value))}
      />

      <button className="generate" onClick={generatePassword}>
        Generate Secure Password
      </button>

      <button className="copy" onClick={copyPassword}>
        Copy to Clipboard
      </button>

      {copied && <div className="copy-feedback">Copied securely ✔</div>}

      <div className="strength-container">
        <small>Entropy: {entropy.toFixed(2)} bits</small>
        <div className="strength-bar-bg">
          <div
            className="strength-bar"
            style={{
              width: strengthPercentage + "%",
              background: strengthColor
            }}
          />
        </div>
        <small>{strengthLabel}</small>
      </div>

      <div className="history">
        <strong>History:</strong>
        {history.map((item, index) => (
          <div key={index} className="history-item">
            {item}
          </div>
        ))}
        {history.length > 0 && (
          <button className="clear" onClick={clearHistory}>
            Clear History
          </button>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
