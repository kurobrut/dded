<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Advanced Secure Password Generator</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.08);
  padding: 35px;
  border-radius: 25px;
  width: 420px;
  height: 560px;              /* FIXED HEIGHT */
  color: white;
  box-shadow: 0 15px 50px rgba(0,0,0,0.5);
  display: flex;              /* FLEX LAYOUT */
  flex-direction: column;
}

.card:hover {
  transform: translateY(-5px);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input[type="text"] {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
  font-size: 14px;
  letter-spacing: 1px;
}

input[type="range"] {
  width: 100%;
}

button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  margin-top: 12px;
  font-weight: bold;
  transition: 0.2s;
}

.generate {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  width: 100%;
  color: white;
}

.copy {
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  width: 100%;
  color: white;
}

button:hover {
  transform: scale(1.03);
}

.history {
  margin-top: 18px;
  font-size: 12px;
  opacity: 0.8;

  flex: 1;                   /* Takes remaining space */
  overflow-y: auto;          /* Scroll instead of expanding */
  padding-right: 5px;
}

.strength-container {
  margin-top: 15px;
}

.strength-bar {
  height: 10px;
  border-radius: 20px;
  margin-top: 6px;
  transition: 0.4s ease;
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [length, setLength] = React.useState(16);
  const [password, setPassword] = React.useState("");
  const [entropy, setEntropy] = React.useState(0);
  const [history, setHistory] = React.useState([]);

  const prefixes = [
    "kalirem","rem","kali","Kali","Rem",
    "KaliRem","KALIREM","KALI","REM"
  ];

  const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";

  // Secure random number without modulo bias
  const secureRandomIndex = (max) => {
    const array = new Uint32Array(1);
    const limit = Math.floor(4294967296 / max) * max;

    let random;
    do {
      window.crypto.getRandomValues(array);
      random = array[0];
    } while (random >= limit);

    return random % max;
  };

  const generatePassword = () => {

    const prefix = prefixes[secureRandomIndex(prefixes.length)];

    if (length <= prefix.length) {
      alert("Length must be greater than prefix length");
      return;
    }

    const remainingLength = length - prefix.length;

    let randomChars = [];
    for (let i = 0; i < remainingLength; i++) {
      randomChars.push(charset[secureRandomIndex(charset.length)]);
    }

    // Insert prefix at random position
    const insertPosition = secureRandomIndex(randomChars.length + 1);
    randomChars.splice(insertPosition, 0, ...prefix.split(""));

    const finalPassword = randomChars.join("");

    // Accurate entropy calculation
    const poolSize = charset.length;
    const totalEntropy = finalPassword.length * Math.log2(poolSize);

    setPassword(finalPassword);
    setEntropy(totalEntropy.toFixed(2));
    setHistory([finalPassword, ...history.slice(0, 4)]);
  };

  const copyPassword = async () => {
    if (!password) return;
    await navigator.clipboard.writeText(password);
    alert("Copied securely!");
  };

  const strengthLevel = () => {
    if (entropy < 50) return { label: "Weak", color: "red", width: "30%" };
    if (entropy < 80) return { label: "Medium", color: "orange", width: "60%" };
    return { label: "Strong", color: "limegreen", width: "100%" };
  };

  const strength = strengthLevel();

  return (
    <div className="card">
      <h2>🔐 Advanced Password Generator</h2>

      <input type="text" value={password} readOnly placeholder="Click generate..." />

      <label>Password Length: {length}</label>
      <input
        type="range"
        min="10"
        max="24"
        value={length}
        onChange={e => setLength(Number(e.target.value))}
      />

      <button className="generate" onClick={generatePassword}>Generate Secure Password</button>
      <button className="copy" onClick={copyPassword}>Copy to Clipboard</button>

      <div className="strength-container">
        <small>Entropy: {entropy} bits</small>
        <div
          className="strength-bar"
          style={{ background: strength.color, width: strength.width }}
        ></div>
        <small>{strength.label}</small>
      </div>

      <div className="history">
        <strong>History:</strong>
        {history.map((item, index) => (
          <div key={index}>{item}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
