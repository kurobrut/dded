<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Secure Password Generator</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #9333ea);
  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.card {
  width: 420px;
  max-width: 95%;
  padding: 35px;
  border-radius: 28px;
  backdrop-filter: blur(30px);
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  color: white;
  display: flex;
  flex-direction: column;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.password-box {
  position: relative;
}

input[type="text"] {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-size: 14px;
  letter-spacing: 1px;
  outline: none;
  background: rgba(255,255,255,0.12);
  color: white;
  transition: 0.3s;
}

input[type="text"]:focus {
  background: rgba(255,255,255,0.2);
}

input[type="range"] {
  width: 100%;
  margin: 10px 0 15px;
}

.options label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  margin-bottom: 6px;
  cursor: pointer;
}

button {
  padding: 12px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  margin-top: 12px;
  transition: 0.25s ease;
  backdrop-filter: blur(10px);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

button:active {
  transform: scale(0.97);
}

.generate {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
}

.copy {
  background: linear-gradient(90deg, #3b82f6, #2563eb);
  color: white;
}

.strength-container {
  margin-top: 18px;
}

.strength-bar-bg {
  height: 10px;
  border-radius: 20px;
  overflow: hidden;
  background: rgba(255,255,255,0.15);
  margin-top: 6px;
}

.strength-bar {
  height: 100%;
  transition: width 0.5s ease, background 0.5s ease;
}

.history {
  margin-top: 18px;
  font-size: 12px;
  max-height: 100px;
  overflow-y: auto;
  opacity: 0.8;
}

.history div {
  margin-bottom: 4px;
  animation: fadeIn 0.4s ease;
}

.copy-feedback {
  font-size: 12px;
  margin-top: 6px;
  color: #22c55e;
  animation: fadeIn 0.3s ease;
}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [length, setLength] = React.useState(15);
  const [password, setPassword] = React.useState("");
  const [entropy, setEntropy] = React.useState(0);
  const [history, setHistory] = React.useState([]);
  const [copied, setCopied] = React.useState(false);

  const [useUpper, setUseUpper] = React.useState(true);
  const [useLower, setUseLower] = React.useState(true);
  const [useNumbers, setUseNumbers] = React.useState(true);
  const [useSymbols, setUseSymbols] = React.useState(true);

  const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
  const lower = "abcdefghijklmnopqrstuvwxyz";
  const numbers = "0123456789";
  const symbols = "!@#$%^&*_+?";

  const secureRandom = (max) => {
    const array = new Uint32Array(1);
    window.crypto.getRandomValues(array);
    return array[0] % max;
  };

  const generatePassword = () => {
    let charset = "";
    let required = [];

    if (useUpper) { charset += upper; required.push(upper[secureRandom(upper.length)]); }
    if (useLower) { charset += lower; required.push(lower[secureRandom(lower.length)]); }
    if (useNumbers) { charset += numbers; required.push(numbers[secureRandom(numbers.length)]); }
    if (useSymbols) { charset += symbols; required.push(symbols[secureRandom(symbols.length)]); }

    if (!charset) return alert("Select at least one option.");

    let result = [...required];

    for (let i = result.length; i < length; i++) {
      result.push(charset[secureRandom(charset.length)]);
    }

    for (let i = result.length - 1; i > 0; i--) {
      const j = secureRandom(i + 1);
      [result[i], result[j]] = [result[j], result[i]];
    }

    const finalPassword = result.join("");
    const totalEntropy = length * Math.log2(charset.length);

    setPassword(finalPassword);
    setEntropy(totalEntropy);
    setHistory([finalPassword, ...history.slice(0, 4)]);
    setCopied(false);
  };

  const copyPassword = async () => {
    if (!password) return;
    await navigator.clipboard.writeText(password);
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };

  const strengthPercent = Math.min((entropy / 180) * 100, 100);
  const strengthColor =
    entropy < 60 ? "#ef4444" :
    entropy < 100 ? "#f59e0b" :
    "#22c55e";

  const strengthLabel =
    entropy < 60 ? "Weak" :
    entropy < 100 ? "Medium" :
    "Strong";

  return (
    <div className="card">
      <h2>🔐 Secure Password Generator</h2>

      <div className="password-box">
        <input type="text" value={password} readOnly placeholder="Generate your password..." />
      </div>

      <label>Password Length: {length}</label>
      <input
        type="range"
        min="8"
        max="15"
        value={length}
        onChange={e => setLength(Number(e.target.value))}
      />

      <div className="options">
        <label><input type="checkbox" checked={useUpper} onChange={() => setUseUpper(!useUpper)} /> Uppercase</label>
        <label><input type="checkbox" checked={useLower} onChange={() => setUseLower(!useLower)} /> Lowercase</label>
        <label><input type="checkbox" checked={useNumbers} onChange={() => setUseNumbers(!useNumbers)} /> Numbers</label>
        <label><input type="checkbox" checked={useSymbols} onChange={() => setUseSymbols(!useSymbols)} /> Symbols</label>
      </div>

      <button className="generate" onClick={generatePassword}>
        Generate Password
      </button>

      <button className="copy" onClick={copyPassword}>
        Copy to Clipboard
      </button>

      {copied && <div className="copy-feedback">Copied ✔</div>}

      <div className="strength-container">
        <small>Entropy: {entropy.toFixed(2)} bits</small>
        <div className="strength-bar-bg">
          <div
            className="strength-bar"
            style={{
              width: strengthPercent + "%",
              background: strengthColor
            }}
          />
        </div>
        <small>{strengthLabel}</small>
      </div>

      <div className="history">
        <strong>Recent:</strong>
        {history.map((item, index) => (
          <div key={index}>{item}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
